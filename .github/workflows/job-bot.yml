name: Job Bot

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm install

      - run: npx playwright install --with-deps

      - run: npx ts-node naukri-job-bot.ts
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASS: ${{ secrets.PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
